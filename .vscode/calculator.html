<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <!-- 使页面宽度与设备（手机，电脑）宽度相同 -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>简约计算器</title>
        <link
        rel="icon"
        type="image/svg+xml"
        href="data:image/svg+xml,<svg t='1764727405480' class='icon' viewBox='0 0 1024 1024' version='1.1' xmlns='http://www.w3.org/2000/svg' p-id='6714' width='200' height='200'><path d='M234.666667 42.666667a42.666667 42.666667 0 0 0-42.24 48.64l60.458666 426.666666a42.666667 42.666667 0 0 0 42.24 36.693334H469.333333v384a42.666667 42.666667 0 1 0 85.333334 0v-384h174.208a42.666667 42.666667 0 0 0 42.24-36.693334l60.458666-426.666666A42.666667 42.666667 0 0 0 789.333333 42.666667h-554.666666zM512 469.333333H332.16L283.818667 128h456.362666l-48.341333 341.333333H512z m-21.333333-234.666666a42.666667 42.666667 0 1 0-85.333334 0v128a42.666667 42.666667 0 0 0 85.333334 0v-128z m85.333333-42.666667a42.666667 42.666667 0 0 1 42.666667 42.666667v128a42.666667 42.666667 0 1 1-85.333334 0v-128a42.666667 42.666667 0 0 1 42.666667-42.666667z' fill='%230A0F40' p-id='6715'></path></svg>"
        > 
        <link rel="stylesheet" href="calculator.css">

    </head>
    <body>
        <div class="calculator-container">
            <!-- 标题栏 -->
            <div class="header">
                <h1>JS简单计算器</h1>
            </div>
            <!-- 显示区 -->
            <div class="display">
                <!-- 表达式 -->
                 <div id="expression"></div>
                 <div id="result">0</div>
            </div>
            <div class="keys">
                <!-- 这里使用button不使用div，button 自带 “可点击、可响应键盘、无障碍” 
                等按钮功能，div 是纯容器，要额外写很多代码才能实现相同效果； -->
                <!-- 第一行按键 -->
                <button id="clearAll">C</button>
                <button id="back">⌫</button>
                <button id="sign">±</button>
                <button class="operate">÷</button>
                <!-- 第二行按键 -->
                <button class="butnumber">7</button>
                <button class="butnumber">8</button>
                <button class="butnumber">9</button>
                <button class="operate">×</button>
                <!-- 第三行按键 -->
                <button class="butnumber">4</button>
                <button class="butnumber">5</button>
                <button class="butnumber">6</button>
                <button class="operate">−</button>
                <!-- 第四行按键 -->
                <button class="butnumber">1</button>
                <button class="butnumber">2</button>
                <button class="butnumber">3</button>
                <button class="operate">+</button>
                <!-- 第五行按键 -->
                <button class="butnumber">0</button>
                <button class="butnumber">.</button>
                <button id="percentage">%</button>
                <button id="equal">=</button>
            </div>
        </div>
        <script src = "calculator.js"></script>
    </body>
</html>
